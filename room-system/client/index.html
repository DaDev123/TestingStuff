<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomChat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0e11;
      --surface:  #17171c;
      --border:   #27272f;
      --accent:   #7c6af7;
      --accent2:  #a78bfa;
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --system:   #4b4b60;
      --danger:   #f87171;
      --success:  #4ade80;
      --radius:   10px;
      --font:     'Inter', system-ui, sans-serif;
      --mono:     'JetBrains Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

    /* ── LOBBY ── */
    #lobby {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }

    .logo {
      font-family: var(--mono);
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
      margin-top: -1.2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    label { font-size: 0.85rem; color: var(--muted); display: block; margin-bottom: 0.35rem; }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--system); }

    .room-row {
      display: flex;
      gap: 0.5rem;
    }
    .room-row input { font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }

    .btn {
      padding: 0.65rem 1.1rem;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-ghost { background: var(--border); color: var(--muted); }
    .btn:hover { opacity: 0.88; }

    .divider { height: 1px; background: var(--border); }

    .server-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .server-row input { font-size: 0.8rem; font-family: var(--mono); }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 99px;
      font-weight: 500;
    }
    .pill-muted { background: var(--border); color: var(--muted); }

    /* ── CHAT ── */
    #chat { display: none; height: 100vh; flex-direction: column; }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .chat-header-left { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }

    .room-badge {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      color: var(--accent2);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .you-badge {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .you-badge strong { color: var(--text); }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--system);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--success); }
    .status-dot.connecting { background: #facc15; animation: pulse 1s infinite; }
    .status-dot.error { background: var(--danger); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .user-count {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .btn-leave {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--font);
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-leave:hover { border-color: var(--danger); color: var(--danger); }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: var(--mono);
      transition: border-color 0.15s, color 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      padding: 0.55rem 0.8rem;
      border-radius: 8px;
      max-width: 78%;
      word-break: break-word;
      transition: background 0.1s;
    }
    .msg:hover { background: color-mix(in srgb, var(--surface) 60%, transparent); }
    .msg.mine { align-self: flex-end; background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .msg.mine:hover { background: color-mix(in srgb, var(--accent) 18%, transparent); }
    .msg.other { align-self: flex-start; }
    .msg.system-msg { align-self: center; text-align: center; }

    .msg-meta {
      font-size: 0.7rem;
      color: var(--system);
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }
    .msg.mine .msg-meta { flex-direction: row-reverse; }
    .msg-user { font-weight: 600; color: var(--muted); }
    .msg.mine .msg-user { color: var(--accent2); }

    .msg-text { font-size: 0.92rem; line-height: 1.5; }

    .msg-system {
      font-size: 0.75rem;
      color: var(--system);
      font-style: italic;
      padding: 0.2rem 0;
    }

    .chat-input-bar {
      display: flex;
      gap: 0.6rem;
      padding: 0.85rem 1.2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #msgInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #msgInput:focus { border-color: var(--accent); }

    .send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1.2rem;
      font-family: var(--font);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* scrollbar */
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* error toast */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--danger); color: #fff; padding: 0.6rem 1.2rem;
      border-radius: 8px; font-size: 0.85rem; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="logo">room<span>.</span>chat</div>
  <p class="tagline">Ephemeral rooms. No signup. Just share the code.</p>

  <div class="card">
    <div class="card-title">Your name</div>
    <div>
      <label for="usernameInput">Display name</label>
      <input id="usernameInput" type="text" maxlength="24" placeholder="e.g. CoolPerson42" autocomplete="off" />
    </div>

    <div class="divider"></div>
    <div class="card-title">Room</div>

    <div>
      <label>Create a new room</label>
      <button class="btn btn-primary" id="createBtn">Generate room &amp; join</button>
    </div>

    <div class="divider"></div>

    <div>
      <label for="roomInput">Or join an existing room</label>
      <div class="room-row">
        <input id="roomInput" type="text" maxlength="12" placeholder="ROOM CODE" autocomplete="off" spellcheck="false" />
        <button class="btn btn-ghost" id="joinBtn">Join</button>
      </div>
    </div>

    <div class="divider"></div>

    <details>
      <summary style="font-size:0.8rem;color:var(--muted);cursor:pointer;user-select:none;">Advanced: custom server</summary>
      <div style="margin-top:0.8rem;display:flex;flex-direction:column;gap:0.4rem;">
        <label for="serverInput">WebSocket server URL</label>
        <input id="serverInput" type="text" placeholder="wss://your-server.onrender.com/ws" />
        <p style="font-size:0.72rem;color:var(--system);">Leave blank to use the default server.</p>
      </div>
    </details>
  </div>

  <p style="font-size:0.72rem;color:var(--system);text-align:center;">
    Messages are not stored after the room closes. <br/>
    Open source · Deploy your own server
  </p>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="status-dot" id="statusDot"></span>
      <span class="room-badge" id="roomLabel"></span>
      <button class="copy-btn" id="copyBtn" title="Copy room code">copy</button>
      <span class="you-badge">you: <strong id="youLabel"></strong></span>
    </div>
    <span class="user-count" id="userCount"></span>
    <button class="btn-leave" id="leaveBtn">Leave</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="chat-input-bar">
    <input id="msgInput" type="text" maxlength="500" placeholder="Type a message…" autocomplete="off" />
    <button class="send-btn" id="sendBtn">Send</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// Replace this with your deployed server URL after deploying to Render:
const DEFAULT_SERVER = 'wss://testingstuff-2ocs.onrender.com/ws';
// During local testing you can use: 'ws://localhost:3000/ws'

// ── STATE ───────────────────────────────────────────────────────────────────
let socket = null;
let reconnectTimer = null;
let currentRoom = null;
let currentUser = null;
let currentServer = null;
let intentionalClose = false;

// ── UTILS ───────────────────────────────────────────────────────────────────
function genCode(len = 6) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, n => chars[n % chars.length]).join('');
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function toast(msg, duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── DOM ──────────────────────────────────────────────────────────────────────
const lobby = document.getElementById('lobby');
const chatView = document.getElementById('chat');
const messages = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const roomLabel = document.getElementById('roomLabel');
const youLabel = document.getElementById('youLabel');
const userCount = document.getElementById('userCount');

function showLobby() {
  lobby.style.display = 'flex';
  chatView.style.display = 'none';
}

function showChat(room, username) {
  lobby.style.display = 'none';
  chatView.style.display = 'flex';
  roomLabel.textContent = room;
  youLabel.textContent = username;
  msgInput.focus();
}

function setStatus(s) {
  statusDot.className = 'status-dot';
  if (s === 'connected') statusDot.classList.add('connected');
  if (s === 'connecting') statusDot.classList.add('connecting');
  if (s === 'error') statusDot.classList.add('error');
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addChatMsg({ username, text, ts, mine }) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (mine ? 'mine' : 'other');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const user = document.createElement('span');
  user.className = 'msg-user';
  user.textContent = username;

  const time = document.createElement('span');
  time.textContent = formatTime(ts);

  meta.appendChild(user);
  meta.appendChild(time);

  const body = document.createElement('div');
  body.className = 'msg-text';
  body.textContent = text;

  wrap.appendChild(meta);
  wrap.appendChild(body);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function setUserCount(n) {
  userCount.textContent = n === 1 ? '1 person' : `${n} people`;
}

// ── WEBSOCKET ────────────────────────────────────────────────────────────────
function connect(room, username, serverUrl) {
  currentRoom = room;
  currentUser = username;
  currentServer = serverUrl;
  intentionalClose = false;
  setStatus('connecting');

  try {
    socket = new WebSocket(serverUrl);
  } catch (e) {
    toast('Could not connect to server.');
    scheduleReconnect();
    return;
  }

  socket.addEventListener('open', () => {
    setStatus('connected');
    socket.send(JSON.stringify({ type: 'join', room, username }));
  });

  socket.addEventListener('message', (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }

    if (msg.type === 'joined') {
      messages.innerHTML = '';
      showChat(msg.room, msg.username);
      setUserCount(msg.count);
      // Render history
      for (const m of (msg.history || [])) {
        if (m.type === 'chat') {
          addChatMsg({ ...m, mine: m.username === currentUser });
        }
      }
    }

    if (msg.type === 'chat') {
      addChatMsg({ ...msg, mine: msg.username === currentUser });
    }

    if (msg.type === 'system') {
      addSystemMsg(msg.text);
      if (typeof msg.count === 'number') setUserCount(msg.count);
    }
  });

  socket.addEventListener('close', () => {
    socket = null;
    setStatus('disconnected');
    if (!intentionalClose) scheduleReconnect();
  });

  socket.addEventListener('error', () => setStatus('error'));
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  addSystemMsg('Disconnected. Reconnecting in 3 s…');
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    if (currentRoom && !intentionalClose) connect(currentRoom, currentUser, currentServer);
  }, 3000);
}

function disconnect() {
  intentionalClose = true;
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (socket) { socket.close(); socket = null; }
  currentRoom = currentUser = currentServer = null;
  setStatus('disconnected');
}

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
  socket.send(JSON.stringify({ type: 'chat', text }));
  msgInput.value = '';
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
function getServerUrl() {
  const custom = document.getElementById('serverInput').value.trim();
  if (!custom) return DEFAULT_SERVER;
  let url = custom;
  if (!/^wss?:\/\//i.test(url)) url = 'wss://' + url;
  if (!/\/ws$/.test(url)) url = url.replace(/\/$/, '') + '/ws';
  return url;
}

function getUsername() {
  return document.getElementById('usernameInput').value.trim() || 'Anon' + Math.floor(Math.random() * 9999);
}

document.getElementById('createBtn').addEventListener('click', () => {
  const code = genCode();
  document.getElementById('roomInput').value = code;
  connect(code, getUsername(), getServerUrl());
});

document.getElementById('joinBtn').addEventListener('click', () => {
  const code = document.getElementById('roomInput').value.trim().toUpperCase();
  if (!code) { toast('Enter a room code first.'); return; }
  connect(code, getUsername(), getServerUrl());
});

document.getElementById('roomInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('joinBtn').click();
});

document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('createBtn').click();
});

document.getElementById('leaveBtn').addEventListener('click', () => {
  disconnect();
  showLobby();
});

document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(currentRoom).then(() => toast('Room code copied!', 1500));
});

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

// Check URL for ?room=CODE shortcut
const urlRoom = new URLSearchParams(location.search).get('room');
if (urlRoom) document.getElementById('roomInput').value = urlRoom.toUpperCase();
</script>
</body>
</html>
